 questions={[

 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">6.1 Concept & Principle of MOC</h3>

 <p className="mb-2 font-bold">Method of Characteristics (MOC):</p>
 <p className="mb-4">
 The Method of Characteristics is a powerful mathematical technique used to solve partial differential equations (PDEs) by converting them into ordinary differential equations (ODEs). These resulting ODEs apply strictly along specific continuous paths (or lines) in the space-time domain, which can then be solved using numerical or graphical techniques.
 </p>

 <p className="mb-2 font-bold">Characteristic Curves:</p>
 <p className="mb-4">
 Characteristics are physical curves plotted in the <MathText content={"$x-t$"} /> plane defined by the equation <MathText content={"$\\frac{dx}{dt} = V \\pm c$"} />, where <MathText content={"$V$"} /> is the velocity of flow and <MathText content={"$c$"} /> is the celerity of the wave. The term <MathText content={"$V \\pm c$"} /> physically represents the absolute velocity at which a disturbance (or pressure wave) propagates through the fluid medium.
 </p>
 <CharacteristicsCurveSVG />
 <p className="mb-4 text-center">
 The slope of these characteristic lines is given by <MathText content={"$\\frac{dt}{dx} = \\frac{1}{V \\pm c}$"} />.
 </p>

 <p className="mb-2 font-bold">Necessity and Advantages of MOC:</p>
 <ul className="list-disc list-inside space-y-2 mb-6 pl-4">
 <li><strong>Simplification:</strong> It mathematically transforms complex, coupled PDEs (like the Navier-Stokes equations for pipe flow) into easily integrable ODEs.</li>
 <li><strong>Accuracy:</strong> It perfectly tracks the propagation of sharp wave fronts (like shock waves or water hammer), avoiding the numerical diffusion/dispersion seen in standard finite difference methods.</li>
 <li><strong>Boundary Constraints:</strong> It conceptually isolates physical boundaries, allowing easy and accurate integration of complex boundary conditions (pumps, valves, reservoirs).</li>
 </ul>
 </section>

 <div className="page-break"></div>

 {/* SECTION 6.4 */}
 <section className="avoid-break mb-16">
 <QuestionBox
 title="6.4 Governing Equations for Unsteady Pipe Flow"
 questions={[
 "Develop the characteristic equations from the partial differential form of unsteady pipe flow. [Multiple Years]",
 "Derive the expressions for the application of MOC to unsteady pipe flow problems. [2080 Chaitra]",
 "Develop a finite-difference solution of unsteady flow equations in terms of velocity and pressure / head and discharge. [Multiple Years]"
 ]}
 />
 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">6.4 Development of Characteristic Equations</h3>

 <p className="mb-4">
 The two basic PDEs governing 1D unsteady pipe flow are the Momentum and Continuity equations.
 </p>
 <p className="mb-2"><strong>1. Momentum Equation:</strong></p>
 <MathText block content={"$$ L_1 = \\frac{\\partial V}{\\partial t} + V\\frac{\\partial V}{\\partial x} + \\frac{1}{\\rho}\\frac{\\partial P}{\\partial x} + g\\sin\\theta + \\frac{fV|V|}{2D} = 0 $$"} />

 <p className="mb-2 mt-6"><strong>2. Continuity Equation:</strong></p>
 <MathText block content={"$$ L_2 = \\frac{\\partial P}{\\partial t} + V\\frac{\\partial P}{\\partial x} + \\rho c^2\\frac{\\partial V}{\\partial x} = 0 $$"} />

 <p className="mb-4 mt-6 text-sm bg-slate-50 border border-slate-200 p-3 italic">
 Where: <MathText content={"$V$"} /> = Avg. Velocity, <MathText content={"$P$"} /> = Pressure, <MathText content={"$\\rho$"} /> = Fluid density, <MathText content={"$c$"} /> = Wave celerity, <MathText content={"$\\theta$"} /> = Pipe slope, <MathText content={"$f$"} /> = Friction factor, <MathText content={"$D$"} /> = Pipe diameter.
 </p>

 <p className="mb-2 font-bold mt-8">Linear Combination:</p>
 <p className="mb-4">
 To convert these into ODEs, we combine them using an unknown multiplier <MathText content={"$\\lambda$"} />: <MathText content={"$L = L_1 + \\lambda L_2 = 0$"} />.
 </p>
 <MathText block content={"$$ L = \\left[ \\frac{\\partial V}{\\partial x}(V + \\lambda\\rho c^2) + \\frac{\\partial V}{\\partial t} \\right] + \\lambda \\left[ \\frac{\\partial P}{\\partial x}\\left(\\frac{1}{\\rho\\lambda} + V\\right) + \\frac{\\partial P}{\\partial t} \\right] + g\\sin\\theta + \\frac{fV|V|}{2D} = 0 $$"} />
 <p className="mb-4 mt-4">
 Recall the total derivatives for Velocity and Pressure: <MathText content={"$\\frac{dV}{dt} = \\frac{\\partial V}{\\partial x}\\frac{dx}{dt} + \\frac{\\partial V}{\\partial t}$"} /> and <MathText content={"$\\frac{dP}{dt} = \\frac{\\partial P}{\\partial x}\\frac{dx}{dt} + \\frac{\\partial P}{\\partial t}$"} />.
 The bracketed terms in <MathText content={"$L$"} /> become total derivatives if and only if:
 </p>
 <MathText block content={"$$ \\frac{dx}{dt} = V + \\lambda\\rho c^2 \\quad \\text{and} \\quad \\frac{dx}{dt} = \\frac{1}{\\rho\\lambda} + V $$"} />
 <p className="mb-4 mt-4">Equating these conditions yields the exact value of the multiplier <MathText content={"$\\lambda$"} />:</p>
 <MathText block content={"$$ V + \\lambda\\rho c^2 = \\frac{1}{\\rho\\lambda} + V \\implies \\lambda^2 = \\frac{1}{\\rho^2 c^2} \\implies \\lambda = \\pm\\frac{1}{\\rho c} $$"} />

 <p className="mb-4 mt-4">Substituting <MathText content={"$\\lambda$"} /> back into the total derivative expression gives the characteristic curves <MathText content={"$\\frac{dx}{dt}$"} />:</p>
 <div className="bg-[#f8fafc] border border-slate-300 p-2 mb-6">
 <MathText block content={"$$ \\frac{dx}{dt} = V \\pm c \\quad \\cdots \\text{(Characteristic Lines)} $$"} />
 </div>
 <p className="mb-4">And substituting <MathText content={"$\\lambda$"} /> into the combined equation <MathText content={"$L$"} /> yields the simplified ODEs:</p>
 <div className="bg-[#f8fafc] border border-slate-300 p-2 mb-6">
 <MathText block content={"$$ \\frac{dV}{dt} \\pm \\frac{1}{\\rho c}\\frac{dP}{dt} + g\\sin\\theta + \\frac{fV|V|}{2D} = 0 \\quad \\cdots \\text{(ODE form)} $$"} />
 </div>
 </section>

 <div className="page-break"></div>

 <section className="avoid-break mb-16">
 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">Finite Difference Solution of Characteristic Equations</h3>
 <p className="mb-4">
 To solve the ODEs numerically, we note that in pipe transients, <MathText content={"$V \\ll c$"} />, thus <MathText content={"$\\frac{dx}{dt} \\approx \\pm c$"} />. We integrate the ODEs along the positive (<MathText content={"$C^+$"} />) and negative (<MathText content={"$C^-$"} />) characteristics.
 </p>

 <p className="mb-2 font-bold">1. Integrating along <MathText content={"$C^+$"} /> (from point A to P):</p>
 <p className="mb-4">Multiplying the ODE by <MathText content={"$\\rho c dt$"} /> and integrating:</p>
 <MathText block content={"$$ \\rho c \\int_A^P dV + \\int_A^P dP + \\int_A^P \\rho c g \\sin\\theta \\,dt + \\int_A^P \\rho c \\,dt \\frac{fV|V|}{2D} = 0 $$"} />
 <p className="mb-4">Since <MathText content={"$dx = c \\,dt$"} /> along <MathText content={"$C^+$"} />, we replace <MathText content={"$c \\,dt$"} /> with <MathText content={"$dx$"} />. Integrating yields the discrete form:</p>
 <MathText block content={"$$ \\rho c(V_P - V_A) + (P_P - P_A) + \\rho g \\sin\\theta \\Delta x + \\frac{\\rho \\Delta x f V_A |V_A|}{2D} = 0 $$"} />

 <p className="mb-2 font-bold mt-8">2. Converting Velocity & Pressure to Discharge & Head:</p>
 <p className="mb-4">
 Using the piezometric head relation <MathText content={"$P = \\rho g(H - Z)$"} />, we evaluate the pressure difference:
 <br /> <MathText content={"$P_P - P_A = \\rho g(H_P - H_A) - \\rho g(Z_P - Z_A)$"} />
 <br /> Substituting <MathText content={"$Z_P - Z_A = \\sin\\theta \\Delta x$"} /> (elevation change), the gravity term exactly cancels out:
 </p>
 <MathText block content={"$$ P_P - P_A = \\rho g(H_P - H_A) - \\rho g \\sin\\theta \\Delta x $$"} />
 <p className="mb-4 mt-4">Substituting this back and replacing velocity <MathText content={"$V = Q/A_{area}$"} />:</p>
 <MathText block content={"$$ \\frac{\\rho c}{A_{area}}(Q_P - Q_A) + \\rho g(H_P - H_A) + \\frac{\\rho \\Delta x f Q_A |Q_A|}{2D A_{area}^2} = 0 $$"} />
 <p className="mb-4 mt-4">Dividing the entire equation by <MathText content={"$\\rho g$"} /> and rearranging to isolate <MathText content={"$H_P$"} />, we get the final explicit finite difference equations:</p>

 <div className="bg-slate-100 border-l-4 border-blue-600 p-4 mb-6">
 <p className="font-bold text-blue-800 mb-2">Along positive characteristic <MathText content={"$C^+$"} /> (A to P):</p>
 <MathText block content={"$$ H_{P} = H_A - B(Q_{P} - Q_A) - R Q_A |Q_A| $$"} />
 </div>
 <div className="bg-slate-100 border-l-4 border-red-600 p-4 mb-6">
 <p className="font-bold text-red-800 mb-2">Along negative characteristic <MathText content={"$C^-$"} /> (B to P):</p>
 <MathText block content={"$$ H_{P} = H_B + B(Q_{P} - Q_B) + R Q_B |Q_B| $$"} />
 </div>
 <p className="mb-4">
 Where the pipeline constants are defined as the <strong>impedance coefficient</strong> <MathText content={"$B = \\frac{c}{gA_{area}}$"} /> and the <strong>resistance coefficient</strong> <MathText content={"$R = \\frac{f\\Delta x}{2gDA_{area}^2}$"} />.
 </p>
 </section>

 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">6.5 Algorithm for Simulating Water Hammer via MOC</h3>

 <p className="mb-2 font-bold text-lg text-emerald-800">Case A: Rectangular Grid (Characteristics on Diagonal)</p>
 <p className="mb-4">
 When the time step is deliberately chosen as <MathText content={"$\\Delta t = \\Delta x / c$"} />, the characteristic lines pass exactly through the pre-defined grid nodes (Courant Number = 1).
 </p>
 <DiagonalGridSVG />

 <p className="mb-4 font-bold">Algorithm Steps:</p>
 <ol className="list-decimal list-inside space-y-3 mb-6 pl-4 bg-slate-50 p-4 border border-slate-200">
 <li>Divide the pipe of length <MathText content={"$L$"} /> into <MathText content={"$N$"} /> reaches: <MathText content={"$\\Delta x = L/N$"} />. Define time step <MathText content={"$\\Delta t = \\Delta x / c$"} />.</li>
 <li>Compute pipeline constants: <MathText content={"$B = \\frac{c}{gA_{area}}$"} /> and <MathText content={"$R = \\frac{f\\Delta x}{2gDA_{area}^2}$"} />.</li>
 <li>Establish initial conditions (steady state): Know <MathText content={"$H$"} /> and <MathText content={"$Q$"} /> for all nodes <MathText content={"$i=1$"} /> to <MathText content={"$N+1$"} /> at <MathText content={"$t=0$"} />.</li>
 <li>Advance the time step to <MathText content={"$t = t + \\Delta t$"} />.</li>
 <li>For all interior nodes (<MathText content={"$i=2$"} /> to <MathText content={"$N$"} />), evaluate the known constants from the previous time step:<br />
 <MathText content={"$C_P = H_{i-1} + Q_{i-1}(B - R|Q_{i-1}|)$"} /> <br />
 <MathText content={"$C_M = H_{i+1} - Q_{i+1}(B - R|Q_{i+1}|)$"} />
 </li>
 <li>Solve simultaneously for the interior unknowns: <br />
 <MathText content={"$H_{Pi} = \\frac{C_P + C_M}{2}$"} /> and <MathText content={"$Q_{Pi} = \\frac{C_P - H_{Pi}}{B}$"} />
 </li>
 <li>For boundary nodes (<MathText content={"$i=1$"} /> and <MathText content={"$i=N+1$"} />), use the single applicable characteristic equation alongside the specific boundary condition (e.g., constant reservoir head or valve closure relation) to solve for local <MathText content={"$H$"} /> and <MathText content={"$Q$"} />.</li>
 <li>Repeat steps 4 through 7 until the final simulation time is reached.</li>
 </ol>

 <div className="page-break"></div>

 <p className="mb-2 font-bold text-lg text-purple-800 mt-10">Case B: Specified Time Intervals (Characteristics Not on Diagonal)</p>
 <p className="mb-4">
 When <MathText content={"$\\Delta t$"} /> is independently specified such that <MathText content={"$\\Delta t < \\Delta x / c$"} />, the characteristic lines originating from point P fall <em>between</em> the established grid nodes at points L and R.
 </p>
 <InterpolationGridSVG />
 <p className="mb-4">
 In this scenario, the values of Head (<MathText content={"$H$"} />) and Discharge (<MathText content={"$Q$"} />) at the foot of the characteristics (points L and R) are not explicitly known and must be found using linear interpolation from adjacent grid nodes A, B, and C.
 </p>
 <MathText block content={"$$ \\text{Interpolation factor: } \\theta = \\frac{c\\Delta t}{\\Delta x} $$"} />
 <p className="mb-4">For Point L (between node i-1 and i):</p>
 <MathText block content={"$$ Q_L = Q_i - \\theta(Q_i - Q_{i-1}) \\quad \\text{and} \\quad H_L = H_i - \\theta(H_i - H_{i-1}) $$"} />
 <p className="mb-4">For Point R (between node i and i+1):</p>
 <MathText block content={"$$ Q_R = Q_i - \\theta(Q_i - Q_{i+1}) \\quad \\text{and} \\quad H_R = H_i - \\theta(H_i - H_{i+1}) $$"} />
 <p className="mb-4">
 Once <MathText content={"$H_L, Q_L, H_R, Q_R$"} /> are obtained, they replace <MathText content={"$H_A, Q_A, H_B, Q_B$"} /> in the standard <MathText content={"$C^+$"} /> and <MathText content={"$C^-$"} /> compatibility equations. Furthermore, the resistance coefficient <MathText content={"$R$"} /> must be scaled down relative to the characteristic length by substituting <MathText content={"$c\\Delta t$"} /> in place of <MathText content={"$\\Delta x$"} />.
 </p>

 <h3 className="font-bold text-xl border-b border-slate-300 pb-2 mb-4 mt-12 text-slate-900">Criteria for Stability of MOC</h3>
 <p className="mb-4">
 The stability of the explicit MOC numerical solution is governed by the <strong>Courant Condition</strong>.
 </p>
 <MathText block content={"$$ \\text{Courant Number } (C_r) = \\frac{c \\Delta t}{\\Delta x} \\le 1 $$"} />
 <p className="mb-4 border-l-4 border-amber-500 pl-4 bg-amber-50 p-4 text-sm leading-relaxed">
 <strong>Physical Meaning:</strong> The characteristic paths represent the absolute speed at which physical pressure waves travel through the pipe. If <MathText content={"$C_r > 1$"} />, the characteristics originating from P will fall completely <em>outside</em> the known grid interval of $[i-1, i+1]$. This forces the numerical scheme to use spatial extrapolation rather than interpolation, which inherently amplifies truncation errors and causes the mathematical solution to rapidly become unstable and blow up.
 </p>
 </section>

 function paint() {

 /* --- rAF render loop: draws only NEW points, never redraws old ones --- */
 function tick() {
 if (!drawing) { raf = 0; return; }
 var n = pts.length;
 if (drawn < n) {
 var sx = window.scrollX, sy = window.scrollY;
 // continue the existing path from last drawn point

 function fixInline(dark){

 /* Skip SVG internals */
 if(el.namespaceURI&&el.namespaceURI.indexOf('svg')!==-1)continue;

 function lum(c){

 }
