 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">7.1 Continuity Equation in Groundwater Flow</h3>

 <p className="mb-4">
 The basic governing equation for groundwater flow is derived by combining the <strong>Steady Continuity Equation</strong> for incompressible flow with <strong>Darcy's Law</strong>.
 </p>

 <p className="mb-2 font-bold">1. Continuity Equation:</p>
 <p className="mb-4">For steady, incompressible flow in three dimensions, the conservation of mass states that the net velocity divergence is zero:</p>
 <MathText block content={"$$ \\frac{\\partial u}{\\partial x} + \\frac{\\partial v}{\\partial y} + \\frac{\\partial w}{\\partial z} = 0 $$"} />

 <p className="mb-4 mt-6 font-bold">2. Darcy's Law:</p>
 <p className="mb-4">Darcy's law states that the velocity through a porous media is directly proportional to the hydraulic gradient. For a homogeneous and isotropic formation:</p>
 <MathText block content={"$$ u = -K\\frac{\\partial h}{\\partial x}, \\quad v = -K\\frac{\\partial h}{\\partial y}, \\quad w = -K\\frac{\\partial h}{\\partial z} $$"} />
 <p className="mb-4">Where <MathText content={"$h$"} /> is the groundwater head (piezometric head) and <MathText content={"$K$"} /> is the hydraulic conductivity.</p>

 <p className="mb-4 mt-6 font-bold">3. Laplace Equation:</p>
 <p className="mb-4">Substituting the Darcy velocity components back into the continuity equation yields the famous <strong>Laplace Equation</strong> for groundwater head. For 2D flow in the horizontal plane:</p>
 <div className="bg-[#f8fafc] border border-slate-300 p-2 mb-6">
 <MathText block content={"$$ \\frac{\\partial^2 h}{\\partial x^2} + \\frac{\\partial^2 h}{\\partial y^2} = 0 $$"} />
 </div>
 </section>

 <div className="page-break"></div>

 {/* SECTION 7.2 */}
 <section className="avoid-break mb-16">
 <QuestionBox
 title="7.2 Numerical Scheme for Groundwater Flow"
 questions={[
 "Derive finite difference scheme for 2D groundwater simulation in steady state for homogeneous & isotropic aquifer. [2076 Bhadra, 2075 Bhadra]",
 "Describe boundary conditions and flow coefficients. [2072 Ashwin]"
 ]}
 />
 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">7.2 Finite Difference Scheme for 2D Groundwater Flow</h3>

 <p className="mb-4">
 Consider an interior grid point <MathText content={"$(i, j)$"} /> in a 2D unconfined aquifer. Let <MathText content={"$q$"} /> represent the Darcy fluxes (per unit area) moving between adjacent grids, and <MathText content={"$q_F$"} /> represent the net volumetric withdrawal (pumping) out of the grid.
 </p>
 <CrossGridSVG />

 <p className="mb-2 font-bold">1. Control Volume Continuity:</p>
 <p className="mb-4">The principle of mass conservation states: <em>Inflow - Outflow = Rate of Change of Storage</em>.</p>
 <MathText block content={"$$ \\Delta x_i \\Delta y_j [q_C - q_D - q_A + q_B - q_F] = S \\frac{\\partial \\phi}{\\partial t} $$"} />
 <p className="mb-4 text-sm text-slate-500 italic">Where <MathText content={"$S$"} /> = Storage coefficient, and <MathText content={"$\\phi$"} /> = Potential head.</p>

 <p className="mb-2 mt-8 font-bold">2. Flow Coefficients via Darcy's Equation:</p>
 <p className="mb-4">The flow rate leaving grid <MathText content={"$i$"} /> towards grid <MathText content={"$i+1$"} /> (i.e., $Q_A$) is given by Darcy's law in terms of transmissivity (<MathText content={"$T$"} />):</p>
 <MathText block content={"$$ Q_A = -T(\\Delta y_j)\\frac{\\phi_{i+1,j} - \\phi_{i,j}}{\\Delta x_{i+1}/2 + \\Delta x_i/2} = -2T(\\Delta y_j)\\frac{\\phi_{i+1,j} - \\phi_{i,j}}{\\Delta x_{i+1} + \\Delta x_i} $$"} />
 <p className="mb-4">The flux per unit area is <MathText content={"$q_A = -Q_A / (\\Delta x_i \\Delta y_j)$"} />:</p>
 <MathText block content={"$$ q_A = A_{i,j}(\\phi_{i+1,j} - \\phi_{i,j}) \\quad \\text{Where} \\quad A_{i,j} = \\frac{2T}{\\Delta x_i(\\Delta x_i + \\Delta x_{i+1})} $$"} />
 <p className="mb-4">Similarly, the other directional fluxes and their coefficients are:</p>
 <MathText block content={"$$ \\begin{aligned} q_C &= C_{i,j}(\\phi_{i-1,j} - \\phi_{i,j}) \\quad &\\text{Where } C_{i,j} = \\frac{2T}{\\Delta x_i(\\Delta x_i + \\Delta x_{i-1})} \\\\ q_D &= D_{i,j}(\\phi_{i,j+1} - \\phi_{i,j}) \\quad &\\text{Where } D_{i,j} = \\frac{2T}{\\Delta y_j(\\Delta y_{j+1} + \\Delta y_j)} \\\\ q_B &= B_{i,j}(\\phi_{i,j-1} - \\phi_{i,j}) \\quad &\\text{Where } B_{i,j} = \\frac{2T}{\\Delta y_j(\\Delta y_{j-1} + \\Delta y_j)} \\end{aligned} $$"} />

 <p className="mb-2 mt-8 font-bold">3. Final Discretized Equation:</p>
 <p className="mb-4">Substituting the fluxes back into the continuity equation and collecting terms around <MathText content={"$\\phi_{i,j}$"} /> gives the general implicit 2D finite difference equation:</p>
 <MathText block content={"$$ A\\phi_{i+1,j} + B\\phi_{i,j-1} + C\\phi_{i-1,j} + D\\phi_{i,j+1} - E\\phi_{i,j} = S\\frac{\\partial \\phi}{\\partial t} + q_F $$"} />
 <p className="mb-4 text-center">Where <MathText content={"$E = A + B + C + D$"} />.</p>

 <div className="bg-[#f8fafc] border-l-4 border-emerald-500 p-4 mb-6">
 <p className="font-bold text-emerald-800 mb-2">Steady State, Homogeneous & Isotropic Aquifer:</p>
 <p className="mb-2">For steady flow (<MathText content={"$\\partial \\phi / \\partial t = 0$"} />), no pumping (<MathText content={"$q_F = 0$"} />), and a square isotropic grid (<MathText content={"$\\Delta x = \\Delta y$"} />, so <MathText content={"$A=B=C=D$"} />), the equation drastically simplifies to the average of the 4 neighbors:</p>
 <MathText block content={"$$ \\phi_{i+1,j} + \\phi_{i,j-1} + \\phi_{i-1,j} + \\phi_{i,j+1} - 4\\phi_{i,j} = 0 $$"} />
 </div>

 <p className="mb-2 mt-8 font-bold">4. Boundary Conditions:</p>
 <ul className="list-disc list-inside space-y-2 pl-4">
 <li><strong>Impervious / Barrier Boundary:</strong> No flow occurs across the boundary. The flow coefficient from that side is forced to zero (e.g., if the left side is a barrier, <MathText content={"$C = 0$"} />).</li>
 <li><strong>Constant Head (Equipotential) Boundary:</strong> The head value <MathText content={"$\\phi$"} /> is fixed at the boundary nodes (e.g., adjacent to a large river or lake).</li>
 </ul>
 </section>

 ]}
 />
 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">7.3 Steady State 2D Model for Dam Seepage</h3>

 <TextbookFigure />

 <p className="mb-4">
 Based on the general 2D formulation derived in 7.2, the steady state potential head at any interior grid point <MathText content={"$(i, j)$"} /> is given by:
 </p>
 <MathText block content={"$$ \\phi_{i,j}^{+} = \\frac{A\\phi_{i+1,j} + B\\phi_{i,j-1} + C\\phi_{i-1,j} + D\\phi_{i,j+1}}{E} $$"} />
 <p className="mb-4">
 For a homogeneous and isotropic soil medium under the dam, this becomes:
 </p>
 <MathText block content={"$$ \\phi_{i,j}^{+} = \\frac{\\phi_{i+1,j} + \\phi_{i,j-1} + \\phi_{i-1,j} + \\phi_{i,j+1}}{4} $$"} />

 <p className="mb-2 font-bold mt-8">Boundary Constraints Identification:</p>
 <ul className="list-disc list-inside space-y-2 mb-6 pl-4">
 <li><strong>AB and CD (Upstream/Downstream beds):</strong> Constant Head boundaries (equipotential lines).</li>
 <li><strong>BC (Dam Base) and EF (Bottom Stratum):</strong> Impervious boundaries (no vertical flow, <MathText content={"$B=0$"} /> or <MathText content={"$D=0$"} /> at these edges).</li>
 <li><strong>AE and DF (Left/Right limits):</strong> Extended far enough to act as Barrier boundaries (no horizontal flow).</li>
 </ul>

 <p className="mb-2 font-bold mt-8">Iterative Algorithm for Computing Potential & Seepage:</p>
 <ol className="list-decimal list-inside space-y-3 mb-6 pl-4 bg-slate-50 p-4 border border-slate-200">
 <li><strong>Initialize:</strong> Establish the grid and apply the known constant head boundary conditions along AB and CD.</li>
 <li><strong>Initial Guess:</strong> Assign an initial estimated value (usually 0) to all interior unknown nodes <MathText content={"$\\phi_{i,j}$"} />.</li>
 <li><strong>Iterate:</strong> Compute the new updated potential <MathText content={"$\\phi_{i,j}^{+}$"} /> for every interior node using the surrounding 4 nodes (Gauss-Seidel method).</li>
 <li><strong>Error Check:</strong> Compute the absolute error <MathText content={"$e = |\\phi_{i,j}^{+} - \\phi_{i,j}|$"} /> at every node.</li>
 <li><strong>Convergence:</strong> If the maximum error across the grid is greater than a specified tolerance, repeat steps 3 and 4. Otherwise, stop the iteration.</li>
 <li><strong>Compute Seepage Rate:</strong> Once the final potential field is converged, calculate the actual volumetric seepage using Darcy's Law across the grids:
 <br />
 Horizontal seepage: <MathText content={"$Q_{i,j}^H = C_{i,j} \\Delta x_i \\Delta y_j (\\phi_{i-1,j} - \\phi_{i,j})$"} />
 <br />
 Vertical seepage: <MathText content={"$Q_{i,j}^V = B_{i,j} \\Delta x_i \\Delta y_j (\\phi_{i,j-1} - \\phi_{i,j})$"} />
 </li>
 </ol>
 </section>

 <div className="page-break"></div>

 <h3 className="font-bold text-2xl border-b-2 border-slate-300 pb-2 mb-6 text-slate-900">7.4 1D Implicit Model for River-Aquifer Interaction</h3>

 <p className="mb-4">
 This model simulates the dynamic interaction of a river recharging a groundwater aquifer (or vice versa). The governing partial differential equation for 1D unsteady groundwater flow is:
 </p>
 <MathText block content={"$$ \\frac{\\partial}{\\partial x}\\left(T\\frac{\\partial\\phi}{\\partial x}\\right) = S\\frac{\\partial\\phi}{\\partial t} + q_{F} $$"} />

 <RiverStageSVG />

 <p className="mb-4 mt-6">By applying the continuity principle over a 1D grid space, the implicit finite difference formulation (evaluating spatial derivatives at the future time step <MathText content={"$+$"} />) for any internal grid <MathText content={"$i$"} /> is:</p>
 <MathText block content={"$$ A_{i}(h_{i+1}^{+} - h_{i}^{+}) + C_{i}(h_{i-1}^{+} - h_{i}^{+}) = \\frac{S_{i}}{\\Delta t}(h_{i}^{+} - h_{i}) + q_{F} $$"} />
 <p className="mb-4 text-sm text-slate-500 italic">
 Where <MathText content={"$h$"} /> and <MathText content={"$h^{+}$"} /> represent the water table elevation at the beginning and end of time step <MathText content={"$\\Delta t$"} />, respectively.
 </p>

 <p className="mb-4">The spatial flow coefficients are defined as:</p>
 <MathText block content={"$$ A_{i} = \\frac{2T}{\\Delta x_{i}(\\Delta x_{i} + \\Delta x_{i+1})} \\quad \\text{and} \\quad C_{i} = \\frac{2T}{\\Delta x_{i}(\\Delta x_{i} + \\Delta x_{i-1})} $$"} />

 <p className="mb-4 mt-8">To simplify, we define lumped constants to collect the unknown future terms (<MathText content={"$h^+$"} />) on the LHS and known present terms (<MathText content={"$h$"} />) on the RHS:</p>
 <MathText block content={"$$ E_{i} = -\\left(A_{i} + C_{i} + \\frac{S_{i}}{\\Delta t}\\right) \\quad \\text{and} \\quad Q_{i} = -\\frac{S_{i}}{\\Delta t}h_{i} + q_{F} $$"} />

 <p className="mb-4">This reduces the continuity equation to a simple linear algebraic equation:</p>
 <div className="bg-[#f8fafc] border border-slate-300 p-2 mb-6">
 <MathText block content={"$$ C_{i}h_{i-1}^{+} + E_{i}h_{i}^{+} + A_{i}h_{i+1}^{+} = Q_{i} $$"} />
 </div>

 <p className="mb-2 font-bold mt-8">Tridiagonal Coefficient Matrix Formulation:</p>
 <p className="mb-4">Writing this equation sequentially for every grid node from <MathText content={"$i=1$"} /> to <MathText content={"$n$"} /> results in a banded system of equations. Because each node only depends on its immediate left and right neighbors, it forms a <strong>Tridiagonal Matrix</strong>:</p>

 <MathText block content={"$$ \\begin{bmatrix} E_{1} & A_{1} & 0 & \\dots & 0 \\\\ C_{2} & E_{2} & A_{2} & \\dots & 0 \\\\ \\vdots & \\ddots & \\ddots & \\ddots & \\vdots \\\\ 0 & \\dots & C_{n-1} & E_{n-1} & A_{n-1} \\\\ 0 & \\dots & 0 & C_{n} & E_{n} \\end{bmatrix} \\begin{bmatrix} h_{1}^{+} \\\\ h_{2}^{+} \\\\ \\vdots \\\\ h_{n-1}^{+} \\\\ h_{n}^{+} \\end{bmatrix} = \\begin{bmatrix} Q_{1} - C_{1}h_{L}^{+} \\\\ Q_{2} \\\\ \\vdots \\\\ Q_{n-1} \\\\ Q_{n} - A_{n}h_{R}^{+} \\end{bmatrix} $$"} />

 <p className="mb-4 mt-6">
 <strong>Boundary Constraints:</strong> <MathText content={"$h_{L}^{+}$"} /> is the dynamic river stage (constant head boundary) at the left. If the right boundary is a physical barrier (no-flow), then the coefficient <MathText content={"$A_{n} = 0$"} />.
 </p>
 <p className="mb-4">
 This matrix system is then efficiently solved at every time step using the Thomas Algorithm to find the new groundwater head profile. The interaction (loss or gain) at the river is simply the computed seepage entering or leaving grid element 1.
 </p>
